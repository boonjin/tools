<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Spark Prompt Mixer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;700;800&family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --bg-top: #ffe7b8;
      --bg-bottom: #c9f3f3;
      --panel: rgba(255, 255, 255, 0.93);
      --ink: #1c2b43;
      --accent: #ff6d3a;
      --accent-dark: #de5021;
      --teal: #109f97;
      --line: #d5e0ee;
      --paper-line: #d9e8fb;
      --paper-bg: #fffefe;
      --chip-sky: #e8f6ff;
      --chip-mint: #e8fbf5;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: "Nunito", sans-serif;
      color: var(--ink);
      background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 72%);
      padding: max(14px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right))
        max(14px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
    }

    .scene {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 999px;
      opacity: 0.42;
      filter: blur(1px);
      animation: drift 14s ease-in-out infinite;
    }

    .blob.one {
      width: 280px;
      height: 280px;
      background: #ffd56f;
      top: -100px;
      left: -90px;
    }

    .blob.two {
      width: 360px;
      height: 360px;
      background: #9ce8de;
      right: -130px;
      bottom: -160px;
      animation-delay: -6s;
    }

    .blob.three {
      width: 230px;
      height: 230px;
      background: #ffc9b8;
      top: 35%;
      right: -85px;
      animation-delay: -3s;
    }

    @keyframes drift {
      0%,
      100% {
        transform: translateY(0) scale(1);
      }

      50% {
        transform: translateY(-18px) scale(1.04);
      }
    }

    .app-shell {
      width: min(980px, 100%);
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: 28px;
      box-shadow: 0 18px 44px rgba(31, 54, 86, 0.16);
      padding: clamp(14px, 2.8vw, 26px);
      display: grid;
      gap: 12px;
    }

    .title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-family: "Baloo 2", cursive;
      font-size: clamp(1.9rem, 4.1vw, 3.05rem);
      letter-spacing: 0.01em;
      line-height: 1.02;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      font-size: 0.96rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.16s ease, box-shadow 0.2s ease, background 0.2s ease;
      white-space: nowrap;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-link {
      background: #edf9f2;
      color: #1f6f52;
      border: 1px solid #c8ead8;
    }

    .btn-link:hover {
      background: #def3e7;
    }

    .control-panel {
      background: #f8fbff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: clamp(12px, 2vw, 16px);
      display: grid;
      gap: 10px;
    }

    .count-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .count-label {
      display: grid;
      gap: 6px;
      color: #2f3f58;
      letter-spacing: 0.02em;
      font-size: 0.93rem;
      text-transform: uppercase;
      font-weight: 800;
    }

    .count-slider {
      width: 100%;
      accent-color: var(--teal);
      cursor: pointer;
    }

    .count-input {
      width: 86px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: #1d3557;
      font: inherit;
      font-weight: 800;
      font-size: 1.02rem;
      text-align: center;
      padding: 10px 12px;
    }

    .count-label .count-input {
      margin: 2px 0 2px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn-main {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 18px rgba(222, 80, 33, 0.28);
    }

    .btn-main:hover {
      background: var(--accent-dark);
    }

    .btn-soft {
      background: #ecf7ff;
      color: #175992;
      border: 1px solid #c1e0f8;
    }

    .btn-soft:hover {
      background: #d8eeff;
    }

    .prompt-panel {
      background: linear-gradient(180deg, #fff 0%, #f6fbff 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .prompt-head h2 {
      margin: 0;
      font-family: "Baloo 2", cursive;
      font-size: clamp(1.35rem, 3vw, 1.95rem);
      line-height: 1.04;
    }

    .prompt-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 8px;
    }

    .prompt-chip {
      background: var(--chip-sky);
      border: 1px solid #c7e6f7;
      color: #154970;
      border-radius: 14px;
      padding: 8px 12px;
      font-size: clamp(0.96rem, 1.8vw, 1.05rem);
      font-weight: 800;
      line-height: 1.28;
      white-space: normal;
      overflow-wrap: anywhere;
      box-shadow: 0 4px 10px rgba(27, 86, 136, 0.08);
      animation: popin 260ms ease both;
    }

    .prompt-chip:nth-child(even) {
      background: var(--chip-mint);
      border-color: #bfe7d8;
      color: #1f6650;
    }

    .prompt-chip.included {
      text-decoration: line-through;
      text-decoration-thickness: 2px;
      text-decoration-color: currentColor;
      text-decoration-skip-ink: none;
      filter: saturate(0.7);
      opacity: 0.85;
    }

    @keyframes popin {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .story-zone {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: clamp(12px, 2.2vw, 18px);
      display: grid;
      gap: 10px;
    }

    .story-head h2 {
      margin: 0;
      font-family: "Baloo 2", cursive;
      font-size: clamp(1.45rem, 3.2vw, 1.95rem);
      line-height: 1.05;
    }

    .story-input {
      width: 100%;
      min-height: clamp(280px, 48vh, 620px);
      border-radius: 16px;
      border: 1px solid #c9dbef;
      padding: 0.4em 16px 14px;
      resize: vertical;
      font-family: "Patrick Hand", "Nunito", sans-serif;
      font-size: clamp(1.28rem, 3.2vw, 1.65rem);
      line-height: 1.55;
      letter-spacing: 0.01em;
      color: #1d3350;
      background-color: var(--paper-bg);
      background-image: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent calc(1.55em - 2px),
        var(--paper-line) calc(1.55em - 2px),
        var(--paper-line) 1.55em
      );
      background-position: 0 0.4em;
    }

    .story-input:focus {
      outline: 3px solid rgba(16, 159, 151, 0.22);
      border-color: #7bcfc9;
    }

    .story-tools {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn-clear {
      background: #fff4f0;
      border: 1px solid #f5d0c3;
      color: #a94726;
      padding: 8px 14px;
      font-size: 0.92rem;
    }

    .btn-clear:hover {
      background: #fee7de;
    }

    @media (max-width: 760px) {
      body {
        padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right))
          max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
      }

      .app-shell {
        padding: 12px;
        gap: 10px;
      }

      .title-row {
        align-items: center;
      }

      .count-row {
        grid-template-columns: 1fr;
      }

      .count-label .count-input {
        width: 110px;
      }

      .button-row > * {
        width: 100%;
      }

      .prompt-panel {
        position: sticky;
        top: max(8px, env(safe-area-inset-top));
        z-index: 48;
        box-shadow: 0 8px 20px rgba(29, 52, 84, 0.16);
      }

      .story-zone {
        min-height: 70vh;
      }

      .story-input {
        min-height: 64vh;
        font-size: clamp(1.3rem, 4.8vw, 1.72rem);
      }
    }

    html.pseudo-fullscreen,
    body.pseudo-fullscreen {
      height: 100%;
      overflow: hidden;
    }

    .app-shell.pseudo-fullscreen {
      position: fixed;
      inset: 0;
      width: 100%;
      max-width: none;
      margin: 0;
      border-radius: 0;
      border: 0;
      overflow: auto;
      padding-top: max(12px, env(safe-area-inset-top));
      padding-right: max(12px, env(safe-area-inset-right));
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      padding-left: max(12px, env(safe-area-inset-left));
      z-index: 999;
      background: rgba(255, 255, 255, 0.98);
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <span class="blob one"></span>
    <span class="blob two"></span>
    <span class="blob three"></span>
  </div>

  <main class="app-shell" id="appShell">
    <header class="title-row">
      <h1>Story Spark Prompt Mixer</h1>
      <a class="btn btn-link" href="../index.html">Back to Projects</a>
    </header>

    <section class="control-panel" aria-label="Prompt controls">
      <div class="count-row">
        <label class="count-label" for="promptCount">
          Number of prompt words
          <input class="count-input" id="countInput" type="number" min="1" max="10" value="3" inputmode="numeric" aria-label="Prompt count number">
          <input class="count-slider" id="promptCount" type="range" min="1" max="10" value="3">
        </label>
      </div>
      <div class="button-row">
        <button class="btn btn-main" id="generateBtn" type="button">New Prompt Words</button>
        <button class="btn btn-soft" id="fullscreenToggle" type="button" aria-pressed="false">Enter Full Screen</button>
      </div>
    </section>

    <section class="prompt-panel" aria-label="Story prompts">
      <div class="prompt-head">
        <h2>Your Prompt Words</h2>
      </div>
      <ul class="prompt-list" id="promptList" aria-live="polite"></ul>
    </section>

    <section class="story-zone" aria-label="Story writing area">
      <div class="story-head">
        <h2>Write Your Story</h2>
      </div>
      <textarea
        id="storyInput"
        class="story-input"
        placeholder="Start writing here..."
        spellcheck="true"
      ></textarea>
      <div class="story-tools">
        <button class="btn btn-clear" id="clearStory" type="button">Clear Writing</button>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var promptBank = [
        "mysterious letter", "forgotten key", "hidden map", "midnight knock", "quiet village", "stormy night",
        "secret passage", "lost backpack", "broken promise", "old lighthouse", "deserted station", "tiny dragon",
        "talking mirror", "last train home", "missing homework", "new student", "abandoned theatre", "magic paintbrush",
        "snowy mountain", "floating island", "stolen crown", "golden compass", "unopened diary", "echoing cave",
        "strange footprint", "vanishing bridge", "secret garden", "locked attic", "time traveller", "friendly ghost",
        "robot helper", "forgotten melody", "ancient riddle", "sunken city", "midnight snack", "curious squirrel",
        "rainy afternoon", "city blackout", "quiet library", "science fair", "broken clock", "hidden treasure",
        "whispering wind", "enchanted forest", "runaway kite", "unexpected guest", "pirate captain", "moonlit beach",
        "frozen lake", "silent museum", "runaway balloon", "bookshop cat", "faded photograph", "new invention",
        "mystery box", "crowded market", "old bicycle", "tiny village", "secret recipe", "train tunnel",
        "forgotten birthday", "classroom challenge", "spilt ink", "giant pumpkin", "pocket watch", "desert storm",
        "rainbow trail", "glass castle", "midday eclipse", "lucky coin", "surprise party", "science experiment",
        "space mission", "lost necklace", "campfire story", "flying carpet", "wild river", "ancient tree",
        "school hallway", "hidden camera", "stray puppy", "winter carnival", "candlelight", "mountain cabin",
        "summer heat", "foggy morning", "secret code", "dragon egg", "treasure hunter", "paper aeroplane",
        "unexpected phone call", "silent alarm", "clock tower", "library basement", "snow globe", "map fragment",
        "mystery potion", "friendly giant", "museum guard", "ocean voyage", "garden maze", "abandoned playground",
        "time loop", "radio message", "moon festival", "city rooftop", "train conductor", "forest ranger",
        "travel journal", "school trip", "volcano island", "storm shelter", "old journal", "hidden talent",
        "missing shoe", "concert night", "camp counsellor", "last biscuit", "magic trick", "strange package",
        "bus stop", "riverbank", "sunrise hike", "night market", "school assembly", "locked phone",
        "festival lanterns", "small spaceship", "forest cabin", "tiny notebook", "storm warning", "family reunion",
        "middle of nowhere", "secret handshake", "surprise test", "bike race", "mystery paint", "quiet promise",
        "wishing well", "windy hill", "city parade", "doorbell", "flashlight", "snow boots",
        "raincoat", "backyard", "playground", "treehouse", "bridge", "telescope",
        "sketchbook", "camera", "campfire", "suitcase", "compass", "umbrella",
        "helmet", "keychain", "postcard", "magnifying glass", "violin", "bathtub boat",
        "flash flood", "solar panel", "hourglass", "sandbox", "toolbox", "hammock",
        "greenhouse", "windmill", "submarine", "cave painting", "sandcastle", "mirror maze",
        "book fair", "pet parade", "school play", "maths contest", "coding club", "chess match",
        "open mic", "charity run", "talent show", "dance rehearsal", "piano recital", "street artist",
        "rescue mission", "team captain", "new neighbour", "strange rumour", "hidden camera roll", "quiet hero",
        "brave choice", "hard truth", "small kindness", "big mistake", "fresh start", "second chance",
        "jellyfish glow", "sea turtle", "penguin parade", "koala nap", "fox den", "owl feather",
        "desert fox", "butterfly garden", "honey trail", "parrot chatter", "beaver dam", "wolf howl",
        "volcanic ash", "tidal wave", "thunder rumble", "northern lights", "sandy dunes", "rainforest path",
        "rocky cliff", "icy trail", "deep canyon", "flower field", "bamboo grove", "wetland marsh",
        "frightened", "hopeful", "curious", "jealous", "relieved", "excited",
        "nervous", "grateful", "confused", "determined", "surprised", "embarrassed",
        "midnight rescue", "secret mission", "unexpected teamwork", "hidden message", "final clue", "dramatic reveal",
        "favourite toy", "colourful mural", "grey clouds", "chequered floor", "organised shelf", "realise the clue",
        "cancelled trip", "travelling circus", "centre stage", "neighbourhood park", "lift lobby", "void deck",
        "hawker centre", "MRT platform", "bus interchange", "wet market", "school canteen", "assembly square",
        "class monitor", "form teacher", "school prefect", "library corner", "rainy monsoon", "sheltered walkway",
        "dragon playground", "community centre", "HDB corridor", "kaya toast", "teh tarik", "ice kacang",
        "satay smoke", "laksa bowl", "char kway teow", "otah bun", "favourite bookmark", "colour pencil tin",
        "science centre trip", "museum ticket", "changi beach", "Pulau Ubin", "gardens by the bay", "merlion statue",
        "mangrove boardwalk", "park connector", "friendly auntie", "helpful uncle", "mum's umbrella", "school badge",
        "CCA practice", "table tennis match", "football training", "primary school gate", "morning assembly",
        "exam timetable", "holiday homework", "storybook corner", "recess bell", "water bottle", "hand sanitiser",
        "treasure map sketch", "rainy season", "thick notebook", "bubble tea queue", "bird park visit",
        "zoo tram ride", "night safari", "sea aquarium", "orchid garden", "flower dome", "cloud forest",
        "esplanade lights", "river cruise", "favourite pen", "colourful sticker", "helpful classmate",
        "quiet corridor", "lost worksheet", "school excursion", "kind librarian", "playground slide",
        "new timetable", "maths homework", "science worksheet", "sports day", "national day parade",
        "red and white flag", "community helper", "safety drill", "kindness challenge", "family photo",
        "birthday card", "storybook dragon", "magic seed", "friendly dolphin", "rainbow umbrella",
        "sunny playground", "afternoon thunderstorm", "tiny notebook key", "mysterious envelope"
      ];

      var maxPrompts = 10;
      var appShell = document.getElementById("appShell");
      var promptCount = document.getElementById("promptCount");
      var countInput = document.getElementById("countInput");
      var generateBtn = document.getElementById("generateBtn");
      var promptList = document.getElementById("promptList");
      var fullscreenToggle = document.getElementById("fullscreenToggle");
      var storyInput = document.getElementById("storyInput");
      var clearStory = document.getElementById("clearStory");
      var pseudoFullscreen = false;

      function clampCount(value) {
        var parsed = parseInt(value, 10);
        if (isNaN(parsed)) {
          return 3;
        }
        if (parsed < 1) {
          return 1;
        }
        if (parsed > maxPrompts) {
          return maxPrompts;
        }
        return parsed;
      }

      function syncCountControls(rawValue) {
        var nextValue = clampCount(rawValue);
        promptCount.value = String(nextValue);
        countInput.value = String(nextValue);
        return nextValue;
      }

      function shuffleAndPick(source, count) {
        var bag = source.slice();
        for (var i = bag.length - 1; i > 0; i -= 1) {
          var j = Math.floor(Math.random() * (i + 1));
          var temp = bag[i];
          bag[i] = bag[j];
          bag[j] = temp;
        }
        return bag.slice(0, count);
      }

      function renderPrompts(items) {
        promptList.innerHTML = "";
        for (var i = 0; i < items.length; i += 1) {
          var chip = document.createElement("li");
          chip.className = "prompt-chip";
          chip.textContent = items[i];
          chip.setAttribute("data-prompt", items[i]);
          chip.style.animationDelay = String(i * 50) + "ms";
          promptList.appendChild(chip);
        }
      }

      function normaliseApostrophes(value) {
        return value.replace(/[\u2018\u2019]/g, "'");
      }

      function escapeRegExp(value) {
        return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function isPromptIncluded(text, prompt) {
        var normalText = normaliseApostrophes(text || "");
        var normalPrompt = normaliseApostrophes(prompt || "");

        var escaped = escapeRegExp(normalPrompt).replace(/\s+/g, "\\s+");
        var startsWord = /[A-Za-z0-9]/.test(normalPrompt.charAt(0));
        var endsWord = /[A-Za-z0-9]/.test(normalPrompt.charAt(normalPrompt.length - 1));
        var prefix = startsWord ? "(^|[^A-Za-z0-9])" : "";
        var suffix = endsWord ? "($|[^A-Za-z0-9])" : "";
        var pattern = new RegExp(prefix + escaped + suffix, "i");

        return pattern.test(normalText);
      }

      function syncPromptMatches() {
        var chips = promptList.querySelectorAll(".prompt-chip");
        var text = storyInput.value || "";

        for (var i = 0; i < chips.length; i += 1) {
          var chip = chips[i];
          var prompt = chip.getAttribute("data-prompt") || chip.textContent || "";
          chip.classList.toggle("included", isPromptIncluded(text, prompt));
        }
      }

      function generatePrompts() {
        var count = syncCountControls(countInput.value);
        var chosen = shuffleAndPick(promptBank, count);
        renderPrompts(chosen);
        syncPromptMatches();
      }

      function updateFullscreenLabel() {
        var isFullscreen = !!document.fullscreenElement || pseudoFullscreen;
        fullscreenToggle.textContent = isFullscreen ? "Exit Full Screen" : "Enter Full Screen";
        fullscreenToggle.setAttribute("aria-pressed", isFullscreen ? "true" : "false");
      }

      function enablePseudoFullscreen() {
        pseudoFullscreen = true;
        document.documentElement.classList.add("pseudo-fullscreen");
        document.body.classList.add("pseudo-fullscreen");
        appShell.classList.add("pseudo-fullscreen");
        updateFullscreenLabel();
      }

      function disablePseudoFullscreen() {
        pseudoFullscreen = false;
        document.documentElement.classList.remove("pseudo-fullscreen");
        document.body.classList.remove("pseudo-fullscreen");
        appShell.classList.remove("pseudo-fullscreen");
        updateFullscreenLabel();
      }

      function togglePseudoFullscreen() {
        if (pseudoFullscreen) {
          disablePseudoFullscreen();
        } else {
          enablePseudoFullscreen();
        }
      }

      function isNativeFullscreenSupported() {
        return !!(document.fullscreenEnabled && appShell.requestFullscreen);
      }

      function toggleFullscreen() {
        if (document.fullscreenElement) {
          document.exitFullscreen().catch(function () {});
          return;
        }

        if (isNativeFullscreenSupported()) {
          appShell.requestFullscreen().catch(function () {
            togglePseudoFullscreen();
          });
          return;
        }

        togglePseudoFullscreen();
      }

      promptCount.addEventListener("input", function () {
        syncCountControls(promptCount.value);
      });

      countInput.addEventListener("input", function () {
        syncCountControls(countInput.value);
      });

      countInput.addEventListener("blur", function () {
        syncCountControls(countInput.value);
      });

      clearStory.addEventListener("click", function () {
        storyInput.value = "";
        storyInput.focus();
        syncPromptMatches();
      });

      storyInput.addEventListener("input", syncPromptMatches);

      generateBtn.addEventListener("click", generatePrompts);
      fullscreenToggle.addEventListener("click", toggleFullscreen);

      document.addEventListener("fullscreenchange", function () {
        if (document.fullscreenElement) {
          disablePseudoFullscreen();
        }
        updateFullscreenLabel();
      });

      syncCountControls(3);
      generatePrompts();
      updateFullscreenLabel();
    })();
  </script>
</body>
</html>
