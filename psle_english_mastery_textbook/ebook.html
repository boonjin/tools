<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PSLE English eBook Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,500;7..72,600;7..72,700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./ebook.css" />
</head>
<body>
  <main class="ebook-shell" id="ebookShell">
    <header class="ebook-header">
      <div class="title-wrap">
        <p class="eyebrow">PSLE English</p>
        <h1>Linear eBook Revision Reader</h1>
        <p class="subtitle">Text-only, page-by-page revision like reading an ebook.</p>
      </div>
      <div class="header-actions">
        <a class="btn" href="./index.html">Back to Interactive Textbook</a>
        <a class="btn" href="../index.html">Back to Projects</a>
        <button class="btn" id="fullscreenToggle" type="button" aria-pressed="false">Enter Full Screen</button>
      </div>
    </header>

    <nav class="reader-nav" aria-label="eBook controls">
      <button class="btn" id="directoryBtn" type="button">Directory</button>
      <button class="btn" id="readerBtn" type="button">Reader</button>
      <button class="btn" id="prevPageBtn" type="button">Previous</button>
      <button class="btn" id="nextPageBtn" type="button">Next</button>

      <label class="field">Chapter
        <select id="chapterSelect"></select>
      </label>

      <label class="field">Page
        <span class="inline-row">
          <input id="pageInput" type="number" min="1" max="1000" inputmode="numeric" />
          <button class="btn" id="goPageBtn" type="button">Go</button>
        </span>
      </label>

      <label class="field">Text Size
        <span class="inline-row">
          <button class="btn" id="fontDownBtn" type="button">A-</button>
          <button class="btn" id="fontUpBtn" type="button">A+</button>
        </span>
      </label>
    </nav>

    <section class="directory-view" id="directoryView" aria-label="Directory page">
      <article class="book-page">
        <h2>Directory</h2>
        <p>Choose a chapter to begin reading from its first page.</p>
        <div class="directory-actions">
          <button class="btn" id="startReadingBtn" type="button">Start From Page 1</button>
          <button class="btn" id="continueReadingBtn" type="button">Continue Last Page</button>
        </div>
        <ol class="directory-list" id="directoryList"></ol>
      </article>
    </section>

    <section class="reader-view hidden" id="readerView" aria-label="Reader page">
      <article class="book-page" id="readerPage">
        <p class="meta-line" id="pageMeta">Page 1 of 1000</p>
        <h2 id="pageTitle">Loading...</h2>
        <div id="bookParagraphs"></div>
      </article>
    </section>

    <footer class="ebook-footer">
      <p id="statusLine">Use Previous and Next to read linearly.</p>
    </footer>
  </main>

  <script src="./content_bank.js"></script>
  <script src="./ebook.js"></script>
</body>
</html>
